# docker-compose.yml — product-service stack
#
# Brings up:
#   - product-db     : PostgreSQL 16 (named volume for data)
#   - product-service: NestJS + Prisma, built from ./Dockerfile
#
# RabbitMQ used to live in this file; it has been moved to the
# root-level `infra/docker-compose.yml` so the broker is part of the
# shared platform backbone rather than a service-domain concern.
# Bring shared infra up before this stack:
#
#       (cd ../infra && docker compose up -d)
#       docker compose up --build
#
# The Nest container is attached to TWO networks:
#   1. `product-net`         — internal, for talking to its own
#                              `product-db` (also: `category-net` for
#                              the cross-service category embed).
#   2. `shared-platform-net` — external global infrastructure backbone,
#                              created by `infra/docker-compose.yml`,
#                              used here to resolve the `rabbitmq`
#                              hostname referenced in RABBITMQ_URL.
#
# Port allocation:
#   - category-service: 8000
#   - product-service : 8001   <- this file
#   - rabbitmq mgmt   : 15672  (owned by infra/docker-compose.yml)
#   If you change PORT in .env, update the `ports:` mapping below to
#   match; they have to stay in sync.
#
# Usage:
#   make up                     # copies .env.example -> .env on first run
#   docker compose up --build   # or run by hand
#   curl http://localhost:8001/healthz

services:
  product-db:
    image: postgres:16
    container_name: product-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-product_db}
      POSTGRES_USER: ${POSTGRES_USER:-product_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - product_db_data:/var/lib/postgresql/data
    # No `ports:` mapping on purpose. Host-side `make migrate-new`
    # reaches product-db via `host.docker.internal:5432` (see .env).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-product_user} -d ${POSTGRES_DB:-product_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - product-net

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    env_file: .env
    environment:
      # Force the in-container host/port to the compose service. If we
      # left .env's `POSTGRES_HOST=localhost` in place, the container
      # would never reach product-db. PORT is also re-pinned to the
      # default 8001 so the container, the host mapping, and the health
      # check all agree.
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      # DATABASE_URL is consumed by Prisma (`url = env("DATABASE_URL")"`
      # in schema.prisma). It must point at product-db, not the host's
      # localhost. Rebuilt from the same POSTGRES_* overrides above so
      # the two never drift.
      DATABASE_URL: postgresql://${POSTGRES_USER:-product_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@product-db:5432/${POSTGRES_DB:-product_db}
      PORT: ${PORT:-8001}
      # category-service alias on the shared network.
      CATEGORY_SERVICE_BASE_URL: http://category-service:8000
      # Resolved over the `shared-platform-net` external network. The
      # hostname `rabbitmq` is owned by infra/docker-compose.yml.
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      product-db:
        condition: service_healthy
    ports:
      - "${PORT:-8001}:${PORT:-8001}"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:'+process.env.PORT+'/api/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    networks:
      - product-net
      - category-net
      - shared-platform-net

volumes:
  product_db_data:
    name: product_db_data

networks:
  product-net:
    name: product-net
    driver: bridge
  category-net:
    # Reuse the network created by category-service's compose so the
    # hostname `category-service` resolves to that container.
    name: category-net
    external: true
  shared-platform-net:
    # Owned by infra/docker-compose.yml at the repo root. This service
    # only attaches to it so the Nest app can reach `rabbitmq` by
    # hostname. Do NOT run `docker compose up` here expecting this
    # network to be created — bring shared infra up first.
    name: shared-platform-net
    external: true