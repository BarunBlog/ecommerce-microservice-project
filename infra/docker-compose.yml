services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    # AMQP + management UI. guest/guest is the dev default and only
    # works on localhost. Create a real user via the management UI
    # (http://localhost:15672) before exposing this to anything else.
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management Web UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - shared-platform-net
  # One-shot bootstrap: declares the topic exchange and binds the inventory queue.
  rabbitmq-setup:
    image: rabbitmq:3-management
    container_name: rabbitmq-setup
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./rabbitmq-setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    networks:
      - shared-platform-net
    restart: "no"

networks:
  shared-platform-net:
    name: shared-platform-net
    driver: bridge
