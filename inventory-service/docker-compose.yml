# docker-compose.yml — inventory-service stack
#
# Brings up:
#   - inventory-db     : PostgreSQL 16 (named volume for data)
#   - inventory-service: NestJS + Prisma, built from ./Dockerfile
#
# RabbitMQ is NOT defined here. It is owned by the root-level
# `infra/docker-compose.yml` as part of the shared platform backbone.
# This stack attaches to `shared-platform-net` (external) so the
# Nest consumer can resolve the `rabbitmq` hostname. Bring shared
# infra up first:
#
#       (cd ../infra && docker compose up -d)
#       docker compose up --build
#
# The Nest container is attached to TWO networks:
#   1. `inventory-net`      — internal, for talking to its own
#                             `inventory-db`.
#   2. `shared-platform-net` — external global infrastructure backbone,
#                             created by `infra/docker-compose.yml`,
#                             used here to resolve the `rabbitmq`
#                             hostname referenced in RABBITMQ_URL.
#
# Port allocation:
#   - category-service: 8000
#   - product-service : 8001
#   - inventory-service: 8002 <- this file
#   - rabbitmq mgmt   : 15672 (owned by infra/docker-compose.yml)
#   If you change PORT in .env, update the `ports:` mapping below to
#   match; they have to stay in sync.
#
# Usage:
#   make up                     # copies .env.example -> .env on first run
#   docker compose up --build   # or run by hand
#   curl http://localhost:8002/api/healthz

services:
  inventory-db:
    image: postgres:16
    container_name: inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventory_db}
      POSTGRES_USER: ${POSTGRES_USER:-inventory_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    # No `ports:` mapping on purpose. Host-side `make migrate-new`
    # reaches inventory-db via `host.docker.internal:5432` (see .env).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory_user} -d ${POSTGRES_DB:-inventory_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - inventory-net

  inventory-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory-service
    restart: unless-stopped
    env_file: .env
    environment:
      # Force the in-container host/port to the compose service. If we
      # left .env's `POSTGRES_HOST=localhost` in place, the container
      # would never reach inventory-db. PORT is also re-pinned to the
      # default 8002 so the container, the host mapping, and the
      # health check all agree.
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      # DATABASE_URL is consumed by Prisma. It must point at
      # inventory-db, not the host's localhost. Rebuilt from the same
      # POSTGRES_* overrides above so the two never drift.
      DATABASE_URL: postgresql://${POSTGRES_USER:-inventory_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@inventory-db:5432/${POSTGRES_DB:-inventory_db}
      PORT: ${PORT:-8002}
      # Resolved over the `shared-platform-net` external network. The
      # hostname `rabbitmq` is owned by infra/docker-compose.yml.
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      # The entrypoint.sh wait uses RABBITMQ_HOST/RABBITMQ_PORT. We
      # pin both so the wait doesn't try localhost.
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: '5672'
    depends_on:
      inventory-db:
        condition: service_healthy
    ports:
      - "${PORT:-8002}:${PORT:-8002}"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:'+process.env.PORT+'/api/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    networks:
      - inventory-net
      - shared-platform-net

volumes:
  inventory_db_data:
    name: inventory_db_data

networks:
  inventory-net:
    name: inventory-net
    driver: bridge
  shared-platform-net:
    # Owned by infra/docker-compose.yml at the repo root. This service
    # only attaches to it so the Nest consumer can reach `rabbitmq` by
    # hostname. Do NOT run `docker compose up` here expecting this
    # network to be created — bring shared infra up first.
    name: shared-platform-net
    external: true